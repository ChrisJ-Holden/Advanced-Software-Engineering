    startLine: 30
  assemblies:
  - AppTest
  namespace: AppTest
  summary: >-
    Verifies that known command names return instances of the expected command type.

    Handles case-insensitive input and trims whitespace.
  example: []
  syntax:
    content: >-
      [DataTestMethod]

      [DataRow(new object?[] { "moveto", typeof(MoveToCommand) })]

      [DataRow(new object?[] { "drawto", typeof(DrawToCommand) })]

      [DataRow(new object?[] { "circle", typeof(CircleCommand) })]

      [DataRow(new object?[] { "tri", typeof(TriCommand) })]

      [DataRow(new object?[] { "rect", typeof(RectCommand) })]

      [DataRow(new object?[] { "pen", typeof(PenColourCommand) })]

      [DataRow(new object?[] { "  MoveTo  ", typeof(MoveToCommand) })]

      [DataRow(new object?[] { "CiRcLe", typeof(CircleCommand) })]

      public void MakeCommand_KnownCommands_ReturnsExpectedType(string input, Type expectedType)
    parameters:
    - id: input
      type: System.String
      description: The command name to create.
    - id: expectedType
      type: System.Type
      description: The expected command type.
    content.vb: >-
      <DataTestMethod>

      <DataRow(New Object() { "moveto", GetType(MoveToCommand) })>

      <DataRow(New Object() { "drawto", GetType(DrawToCommand) })>

      <DataRow(New Object() { "circle", GetType(CircleCommand) })>

      <DataRow(New Object() { "tri", GetType(TriCommand) })>

      <DataRow(New Object() { "rect", GetType(RectCommand) })>

      <DataRow(New Object() { "pen", GetType(PenColourCommand) })>

      <DataRow(New Object() { "  MoveTo  ", GetType(MoveToCommand) })>

      <DataRow(New Object() { "CiRcLe", GetType(CircleCommand) })>

      Public Sub MakeCommand_KnownCommands_ReturnsExpectedType(input As String, expectedType As Type)
